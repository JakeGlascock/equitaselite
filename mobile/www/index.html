<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Equitas Elite</title>
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: #031427; color: #bec6e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
    }
    .wrap {
      min-height: 100vh; min-height: 100dvh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 24px; text-align: center;
    }
    .label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px; letter-spacing: 0.2em;
      text-transform: uppercase; color: #e9c176;
      margin: 0 0 16px 0;
    }
    h1 {
      font-family: 'Cormorant Garamond', 'Playfair Display', Georgia, serif;
      font-weight: 500; color: #e9c176;
      font-size: 32px; margin: 0 0 12px 0;
    }
    p { font-size: 14px; line-height: 1.5; max-width: 320px; color: #8892a4; }
    .spinner {
      width: 28px; height: 28px; border: 2px solid rgba(233,193,118,0.2);
      border-top-color: #e9c176; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-top: 24px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <p class="label">Equitas Elite</p>
    <h1>Connecting&hellip;</h1>
    <p>If this screen lingers, check your connection and pull to refresh.</p>
    <div class="spinner"></div>
  </div>
</body>
</html>
