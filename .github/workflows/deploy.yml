name: Deploy

on:
  push:
    branches: [master]
    paths:
      # App code changes always need a redeploy
      - 'nextjs/**'
      # Task-definition changes (env vars, CPU/memory, etc.) need a deploy to
      # carry the new revision into the service — Terraform registers the
      # revision but the service stays pinned to the old one thanks to
      # lifecycle.ignore_changes on task_definition.
      - 'infrastructure/ecs.tf'
      # Iterating on the workflow itself
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write  # required for OIDC

env:
  # Run JS-based actions (checkout, setup-node, configure-aws-credentials, etc.)
  # on Node 24 ahead of the June 2026 deprecation of Node 20 on GitHub runners.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AWS_REGION:        us-east-1
  AWS_ACCOUNT_ID:    "625227331957"
  ECR_REGISTRY:      625227331957.dkr.ecr-fips.us-east-1.amazonaws.com
  ECR_REPOSITORY:    equitaselite-prod
  ECS_CLUSTER:       equitaselite-prod
  ECS_SERVICE:       equitaselite-prod
  TASK_FAMILY:       equitaselite-prod
  CONTAINER_NAME:    app
  DEPLOY_ROLE_ARN:   arn:aws:iam::625227331957:role/equitaselite-github-deploy-prod

# Don't queue parallel deploys for the same branch — newer push wins.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "$ECR_REGISTRY"

      # Buildx + GitHub Actions cache shave 60-90s off subsequent deploys.
      # The base image, npm install layer (when package-lock.json hasn't
      # changed), and unchanged source files all hit cache. First-deploy
      # after this change is slow (no cache yet); every one after is fast.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (with GHA cache)
        working-directory: nextjs
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          FULL_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "Building $FULL_IMAGE"
          # CACHE_BUST forces the Dockerfile's source-copy + build layers
          # to invalidate per commit (BuildKit's GHA cache backend was
          # observed serving stale `COPY . .` layers on 2026-05-29). The
          # deps layer (npm install) is BEFORE the ARG and still caches.
          docker buildx build \
            --platform linux/amd64 \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --build-arg "CACHE_BUST=$IMAGE_TAG" \
            --load \
            -t "$FULL_IMAGE" \
            .
          echo "FULL_IMAGE=$FULL_IMAGE" >> "$GITHUB_ENV"

      - name: Push image
        # ECR has IMMUTABLE tag policy and we tag by commit SHA. If a prior
        # run already pushed this exact tag (e.g., this is a `gh run rerun`
        # after a later step failed), the push fails — but the image is
        # already where we need it. Detect that case and continue.
        run: |
          set +e
          OUT=$(docker push "$FULL_IMAGE" 2>&1)
          CODE=$?
          set -e
          echo "$OUT"
          if [ $CODE -eq 0 ]; then
            echo "Push OK"
          elif echo "$OUT" | grep -q "tag invalid.*already exists"; then
            echo "Tag $FULL_IMAGE already exists in ECR (immutable). Reusing."
          else
            echo "Push failed with exit code $CODE"
            exit $CODE
          fi

      - name: Register new task definition revision
        id: register
        run: |
          # Pull the current task definition, strip read-only fields, swap the image.
          NEW_TD=$(
            aws ecs describe-task-definition \
              --task-definition "$TASK_FAMILY" \
              --query 'taskDefinition' \
            | jq --arg img "$FULL_IMAGE" '
                del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                    .compatibilities, .registeredAt, .registeredBy)
                | .containerDefinitions[0].image = $img
              '
          )

          NEW_ARN=$(
            aws ecs register-task-definition \
              --cli-input-json "$NEW_TD" \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text
          )
          echo "Registered $NEW_ARN"
          echo "task_definition_arn=$NEW_ARN" >> "$GITHUB_OUTPUT"

      - name: Run DB migrations
        id: migrate
        env:
          NEW_TASK_DEF: ${{ steps.register.outputs.task_definition_arn }}
        run: |
          set -euo pipefail

          # Reuse the service's existing networkConfiguration so the one-off
          # task lands in the same private subnets + security group (and can
          # reach RDS via the existing app→DB egress rule).
          NET_CONFIG=$(
            aws ecs describe-services \
              --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" \
              --query 'services[0].networkConfiguration' \
              --output json
          )

          OVERRIDES=$(
            jq -n --arg name "$CONTAINER_NAME" \
              '{containerOverrides:[{name:$name,command:["node","scripts/migrate.mjs"]}]}'
          )

          echo "Launching migration task with $NEW_TASK_DEF"
          TASK_ARN=$(
            aws ecs run-task \
              --cluster "$ECS_CLUSTER" \
              --task-definition "$NEW_TASK_DEF" \
              --launch-type FARGATE \
              --network-configuration "$NET_CONFIG" \
              --overrides "$OVERRIDES" \
              --started-by "migrate-${GITHUB_SHA:0:8}" \
              --query 'tasks[0].taskArn' --output text
          )
          echo "Task: $TASK_ARN"
          echo "task_arn=$TASK_ARN" >> "$GITHUB_OUTPUT"

          echo "Waiting for task to stop (timeout ~10 min)…"
          aws ecs wait tasks-stopped \
            --cluster "$ECS_CLUSTER" --tasks "$TASK_ARN"

          EXIT_CODE=$(
            aws ecs describe-tasks \
              --cluster "$ECS_CLUSTER" --tasks "$TASK_ARN" \
              --query 'tasks[0].containers[0].exitCode' --output text
          )
          STOP_REASON=$(
            aws ecs describe-tasks \
              --cluster "$ECS_CLUSTER" --tasks "$TASK_ARN" \
              --query 'tasks[0].stoppedReason' --output text
          )
          echo "Migration task exit code: ${EXIT_CODE:-none} (stopped reason: $STOP_REASON)"

          if [ "$EXIT_CODE" != "0" ]; then
            echo "::error::Migration task failed — aborting deploy"
            exit 1
          fi

      - name: Migration task logs
        if: always() && steps.migrate.outputs.task_arn != ''
        env:
          TASK_ARN: ${{ steps.migrate.outputs.task_arn }}
        run: |
          # ECS log stream name: <awslogs-stream-prefix>/<container>/<task-uuid>.
          # The prefix on this task definition is "app" (not "ecs"), so the
          # constructed stream is app/app/<task-id>.
          TASK_ID=$(echo "$TASK_ARN" | awk -F'/' '{print $NF}')
          STREAM="app/$CONTAINER_NAME/$TASK_ID"
          echo "Log stream: /ecs/$TASK_FAMILY :: $STREAM"
          aws logs get-log-events \
            --log-group-name "/ecs/$TASK_FAMILY" \
            --log-stream-name "$STREAM" \
            --start-from-head \
            --query 'events[*].message' --output text \
            || echo "(no logs — stream may not exist yet)"

      - name: Update ECS service
        env:
          NEW_TASK_DEF: ${{ steps.register.outputs.task_definition_arn }}
        run: |
          # Print BEFORE state so we can tell whether the wait was waiting
          # on a real rollout or fired immediately because the deployment
          # was rejected.
          echo "::group::Service BEFORE update"
          aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" \
            --query 'services[0].{taskDef:taskDefinition,deployments:deployments[*].{id:id,status:status,taskDef:taskDefinition,desired:desiredCount,running:runningCount,rolloutState:rolloutState,rolloutReason:rolloutStateReason}}' \
            --output json
          echo "::endgroup::"

          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --task-definition "$NEW_TASK_DEF" \
            --force-new-deployment \
            > /dev/null
          echo "Service update initiated (force-new-deployment) → $NEW_TASK_DEF"

      - name: Wait for service stable
        run: |
          # Poll deployment state with a short timeout. `aws ecs wait
          # services-stable` returns success even after a rollback to the
          # PREVIOUS task def — so it can't tell us if the rollout
          # actually landed. We tail deployment events instead.
          for i in $(seq 1 60); do
            STATE=$(aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" \
              --query 'services[0].deployments[?status==`PRIMARY`].rolloutState' --output text)
            echo "[$i] PRIMARY rolloutState=$STATE"
            if [ "$STATE" = "COMPLETED" ]; then break; fi
            if [ "$STATE" = "FAILED" ]; then
              echo "::error::Deployment FAILED — circuit breaker rolled back."
              aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" \
                --query 'services[0].events[0:10].[createdAt,message]' --output text
              exit 1
            fi
            sleep 10
          done

          echo "::group::Service AFTER rollout"
          aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" \
            --query 'services[0].{taskDef:taskDefinition,deployments:deployments[*].{id:id,status:status,taskDef:taskDefinition,desired:desiredCount,running:runningCount,rolloutState:rolloutState,rolloutReason:rolloutStateReason}}' \
            --output json
          echo "::endgroup::"

          echo "::group::Recent service events (last 10)"
          aws ecs describe-services --cluster "$ECS_CLUSTER" --services "$ECS_SERVICE" \
            --query 'services[0].events[0:10].[createdAt,message]' --output text
          echo "::endgroup::"

      - name: Verify health
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsSL --max-time 10 https://equitaselite.com/api/health > /dev/null; then
              echo "✓ /api/health OK"
              exit 0
            fi
            echo "Attempt $i failed; retrying in 5s"
            sleep 5
          done
          echo "Health check never returned 200"
          exit 1
