name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read
  security-events: write  # required for uploading SARIF results

env:
  # Run JS-based actions (checkout, setup-node, etc.) on Node 24 ahead of the
  # June 2026 deprecation of Node 20 on GitHub-hosted runners.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── 1. Type-check + lint ──────────────────────────────────────────────────
  typecheck-lint:
    name: Type-check & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nextjs

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: npm install

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

  # ── 2. Unit tests + coverage ─────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nextjs

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: npm install

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: nextjs/coverage/
          retention-days: 14

  # ── 3. Dependency vulnerability audit ────────────────────────────────────
  npm-audit:
    name: npm Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nextjs

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - run: npm install

      - name: Audit dependencies (fail on high/critical)
        run: npm audit --audit-level=high --omit=dev

  # ── 4. Container vulnerability scan (Trivy) ───────────────────────────────
  trivy:
    name: Container Scan (Trivy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t equitaselite:ci nextjs/

      - name: Scan image for HIGH/CRITICAL CVEs
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: equitaselite:ci
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: .trivyignore

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ── 5. Terraform static analysis (Checkov) ───────────────────────────────
  checkov:
    name: Terraform IaC Scan (Checkov)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Checkov on infrastructure/
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infrastructure/
          framework: terraform
          output_format: sarif
          output_file_path: checkov-results.sarif
          # Skipped checks with justification:
          # CKV2_AWS_62  — S3 event notifications intentionally omitted (operational noise)
          # CKV_AWS_144  — S3 cross-region replication deferred; single-region MVP, will add for multi-region HA
          # CKV2_AWS_57  — Secrets Manager auto-rotation requires rotation Lambda; deferred until app Lambda layer is built
          # CKV2_AWS_71  — Wildcard ACM cert (*.equitaselite.com) is intentional to cover staging + future subdomains
          # CKV2_AWS_28  — WAF IS attached via aws_wafv2_web_acl_association in waf.tf;
          #                Checkov only inspects the aws_lb resource itself and misses the association
          # CKV_AWS_26   — SNS topic intentionally unencrypted: it's only for CloudTrail/CloudWatch
          #                alarm notifications (alert metadata, not secrets), and KMS-encrypted SNS
          #                requires CloudTrail in the key policy which couples unrelated services
          # CKV_AWS_290  — github_deploy_ecs policy needs ecs:RegisterTaskDefinition / DescribeServices /
          # CKV_AWS_355    DescribeTaskDefinition on Resource="*" because those actions do not support
          #                resource-level permissions per AWS IAM. iam:PassRole is scoped to the two
          #                task roles with iam:PassedToService=ecs-tasks.amazonaws.com.
          # CKV2_AWS_38  — Route 53 DNSSEC requires a separate KSK in us-east-1 KMS + registrar support
          # CKV2_AWS_39    + delegation set updates at GoDaddy. Deferred until production hardening pass.
          #                Query logging also deferred (cost + low signal at this scale).
          # CKV2_AWS_76  — WAF Log4j coverage is provided by AWSManagedRulesKnownBadInputsRuleSet
          #                (waf.tf rule "AWSManagedRulesKBI"). Checkov looks at the local rule
          #                name attribute and doesn't match our display name "AWSManagedRulesKBI".
          skip_check: CKV2_AWS_62,CKV_AWS_144,CKV2_AWS_57,CKV2_AWS_71,CKV2_AWS_28,CKV_AWS_26,CKV_AWS_290,CKV_AWS_355,CKV2_AWS_38,CKV2_AWS_39,CKV2_AWS_76

      - name: Upload Checkov SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results.sarif

  # ── 6. Secret scanning (Gitleaks) ────────────────────────────────────────
  gitleaks:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history required for git-diff detection

      - name: Scan for leaked secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
