<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Equitas Elite — Secure Gateway</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&family=IBM+Plex+Sans:wght@500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "surface-tint": "#bec6e0",
        "surface-variant": "#26364a",
        "surface-container-highest": "#26364a",
        "surface-container-high": "#1b2b3f",
        "surface-container": "#102034",
        "surface-container-low": "#0b1c30",
        "surface-container-lowest": "#000f21",
        "background": "#031427",
        "surface": "#031427",
        "surface-dim": "#031427",
        "surface-bright": "#2a3a4f",
        "primary": "#bec6e0",
        "on-primary": "#283044",
        "primary-container": "#0f172a",
        "on-primary-container": "#798098",
        "inverse-primary": "#565e74",
        "secondary": "#e9c176",
        "on-secondary": "#412d00",
        "secondary-container": "#604403",
        "on-secondary-container": "#dab36a",
        "tertiary": "#4edea3",
        "on-tertiary": "#003824",
        "tertiary-container": "#001c10",
        "on-tertiary-container": "#009365",
        "on-surface": "#d3e4fe",
        "on-surface-variant": "#c6c6cd",
        "outline": "#909097",
        "outline-variant": "#45464d",
        "inverse-surface": "#d3e4fe",
        "inverse-on-surface": "#213145",
        "error": "#ffb4ab",
        "on-error": "#690005",
        "error-container": "#93000a",
      },
      borderRadius: {
        "sm": "0.25rem",
        "DEFAULT": "0.5rem",
        "md": "0.75rem",
        "lg": "1rem",
        "xl": "1.5rem",
        "full": "9999px",
      },
      fontFamily: {
        "display": ["Playfair Display", "serif"],
        "body": ["Inter", "sans-serif"],
        "label": ["IBM Plex Sans", "sans-serif"],
      },
    },
  },
}
</script>
<style>
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
  }
  .glass-panel {
    background: rgba(16, 32, 52, 0.75);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(69, 70, 77, 0.5);
  }
  .gold-glow {
    box-shadow: 0 0 32px rgba(233, 193, 118, 0.12);
  }
  body { min-height: 100dvh; }
</style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col overflow-hidden">

<!-- Header -->
<header class="w-full flex justify-center items-center px-5 h-14 z-10 relative">
  <div class="flex flex-col items-center gap-0.5">
    <span class="material-symbols-outlined text-secondary text-2xl" style="font-variation-settings:'FILL' 1,'wght' 300,'GRAD' 0,'opsz' 24">shield</span>
    <span class="font-label text-[11px] font-semibold tracking-[0.12em] text-secondary uppercase">Equitas Elite</span>
  </div>
</header>

<main class="flex-grow flex items-center justify-center px-5 relative">
  <!-- Ambient glows -->
  <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-1/4 -right-1/4 w-3/4 h-3/4 bg-secondary/5 rounded-full blur-[120px]"></div>
    <div class="absolute -bottom-1/4 -left-1/4 w-2/3 h-2/3 bg-primary/5 rounded-full blur-[100px]"></div>
  </div>

  <div class="w-full max-w-md z-10">
    <!-- Hero -->
    <div class="text-center mb-8">
      <h1 class="font-display text-[32px] font-bold leading-[40px] tracking-[-0.02em] text-on-surface mb-3">Welcome Back</h1>
      <p class="text-[14px] text-on-surface-variant max-w-[280px] mx-auto leading-5">Access your institutional portfolio with military-grade encryption.</p>
    </div>

    <!-- Login Form -->
    <div class="glass-panel gold-glow px-6 py-7 rounded-xl">
      <form id="login-form" class="space-y-5" onsubmit="handleLogin(event)">
        <div class="space-y-1">
          <label class="font-label text-[11px] font-semibold tracking-[0.08em] text-primary uppercase block px-1" for="email">Institutional Email</label>
          <input class="w-full bg-surface-container-highest border-0 border-b-2 border-outline-variant focus:border-secondary focus:ring-0 text-on-surface px-1 py-3 transition-all duration-300 placeholder:text-on-surface-variant/40 text-sm outline-none"
            id="email" placeholder="name@institution.com" type="email" autocomplete="email"/>
        </div>
        <div class="space-y-1">
          <label class="font-label text-[11px] font-semibold tracking-[0.08em] text-primary uppercase block px-1" for="password">Secure Access Key</label>
          <input class="w-full bg-surface-container-highest border-0 border-b-2 border-outline-variant focus:border-secondary focus:ring-0 text-on-surface px-1 py-3 transition-all duration-300 placeholder:text-on-surface-variant/40 text-sm outline-none"
            id="password" placeholder="••••••••" type="password" autocomplete="current-password"/>
        </div>
        <div id="login-error" class="hidden text-[12px] text-error text-center pt-1"></div>
        <div class="pt-3 space-y-3">
          <button type="submit" class="w-full h-11 bg-secondary text-on-secondary font-label text-[11px] font-semibold tracking-[0.08em] uppercase rounded-lg hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
            Sign In
            <span class="material-symbols-outlined text-sm">arrow_forward</span>
          </button>
          <button type="button" onclick="handleBiometric()" class="w-full h-11 border border-outline-variant text-on-surface font-label text-[11px] font-semibold tracking-[0.08em] uppercase rounded-lg hover:bg-surface-variant/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
            <span class="material-symbols-outlined text-lg">fingerprint</span>
            Use Biometrics
          </button>
        </div>
      </form>
      <div class="mt-5 pt-4 border-t border-outline-variant/20 flex flex-col items-center gap-2">
        <a href="#" class="font-label text-[11px] font-semibold tracking-[0.08em] text-secondary/70 hover:text-secondary transition-colors uppercase">Forgot Credentials?</a>
        <p class="text-[12px] text-on-surface-variant/60 mt-1">New to Equitas Elite? <a href="onboarding.html" class="text-secondary hover:underline">Register your institution</a></p>
      </div>
    </div>

    <!-- Trust badges placeholder -->
    <div class="mt-6 flex justify-center gap-6 opacity-30">
      <div class="flex items-center gap-1.5">
        <span class="material-symbols-outlined text-sm text-primary">verified_user</span>
        <span class="font-label text-[10px] tracking-widest text-on-surface-variant uppercase">SEC Compliant</span>
      </div>
      <div class="flex items-center gap-1.5">
        <span class="material-symbols-outlined text-sm text-primary">lock</span>
        <span class="font-label text-[10px] tracking-widest text-on-surface-variant uppercase">256-bit AES</span>
      </div>
    </div>
  </div>
</main>

<footer class="py-4 text-center">
  <p class="font-label text-[10px] text-on-surface-variant/40 tracking-widest uppercase">Encrypted End-to-End · Session ID: 892-XTQ-001</p>
</footer>

<script>
  // Seed demo data if not present
  if (!localStorage.getItem('ee_users')) {
    localStorage.setItem('ee_users', JSON.stringify([
      {
        email: 'demo@angelinvestor.com',
        password: 'demo123',
        type: 'angel',
        name: 'Alexandra Mercer',
        firm: 'Mercer Ventures',
        title: 'Managing Partner',
        location: 'New York, USA',
        aum: '$50M',
        minCheck: 1,
        maxCheck: 10,
        stages: ['Seed', 'Series A'],
        sectors: ['FinTech', 'Deep Tech', 'Life Sciences'],
        geography: 'North America',
        riskTolerance: 'Aggressive',
        expectedReturn: '10x+',
        timeline: '5-7 years',
        coInvest: true,
        onboarded: true
      },
      {
        email: 'demo@familyoffice.com',
        password: 'demo123',
        type: 'family_office',
        name: 'Edward Blackwood',
        firm: 'Blackwood Capital Partners',
        title: 'Chief Investment Officer',
        location: 'London, UK',
        aum: '$450M',
        minCheck: 5,
        maxCheck: 50,
        stages: ['Series A', 'Series B'],
        sectors: ['Life Sciences', 'Deep Tech', 'Clean Energy'],
        geography: 'Global',
        riskTolerance: 'Moderate',
        mandate: 'Growth',
        concentration: 'Direct',
        onboarded: true
      }
    ]));
  }

  function handleLogin(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('login-error');

    const users = JSON.parse(localStorage.getItem('ee_users') || '[]');
    const user = users.find(u => u.email === email && u.password === password);

    if (!user) {
      errEl.textContent = 'Invalid credentials. Try demo@angelinvestor.com or demo@familyoffice.com with password: demo123';
      errEl.classList.remove('hidden');
      return;
    }

    localStorage.setItem('ee_current_user', JSON.stringify(user));
    errEl.classList.add('hidden');

    if (!user.onboarded) {
      window.location.href = 'onboarding.html';
    } else {
      window.location.href = 'dashboard.html';
    }
  }

  function handleBiometric() {
    // Demo: auto-login as angel investor
    const users = JSON.parse(localStorage.getItem('ee_users') || '[]');
    const user = users[0];
    localStorage.setItem('ee_current_user', JSON.stringify(user));
    window.location.href = 'dashboard.html';
  }
</script>
</body>
</html>
